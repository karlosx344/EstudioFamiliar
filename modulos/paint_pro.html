<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><link rel="stylesheet" href="../style.css">
<style>body{margin:0;display:flex;flex-direction:column;height:100vh;background:#05050a;} .barra{background:rgba(0,0,0,0.8);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid var(--user-color, #00f2ff);} .btn-xp{background:rgba(0,255,136,0.2);border:1px solid #00ff88;color:#00ff88;padding:8px 15px;border-radius:8px;cursor:pointer;font-family:'Orbitron',sans-serif;font-weight:bold;transition:0.3s;} .btn-xp:hover{background:#00ff88;color:black;box-shadow:0 0 15px #00ff88;} iframe{flex-grow:1;border:none;width:100%;}</style>
</head><body>
    <div class="barra">
        <span style="color:white;font-family:'Rajdhani',sans-serif;font-size:1.2em;">✨ Sketchpad Pro (Arte Vectorial)</span>
        <button class="btn-xp" onclick="reclamarPuntos(20)">🌟 Terminé mi Obra (+20 XP)</button>
    </div>
    <iframe src="https://sketch.io/sketchpad/"></iframe>
    <script>
        function reclamarPuntos(xp) {
            try {
                const u = new URLSearchParams(window.parent.location.search).get('u') || 'peque';
                localStorage.setItem('pts_'+u, (parseInt(localStorage.getItem('pts_'+u))||0) + xp);
                if(window.parent.updateUI) window.parent.updateUI();
                if(window.parent.confetti) window.parent.confetti({particleCount:200, spread:90, origin:{y:0.6}});
                if(window.parent.Swal) window.parent.Swal.fire({title:'¡Arte Pro Guardado!', text:`+${xp} XP añadidos a tu perfil.`, icon:'success', background:'#0a0a19', color:'#fff'});
            } catch(e) {}
        }
    </script>
</body></html>
